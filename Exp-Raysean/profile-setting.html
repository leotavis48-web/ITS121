<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Settings - ZZZ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>

<body>

<main class="zzz-account-frame">

    <!-- Profile Settings Section -->
    <section class="zzz-section">

        <h1 class="zzz-account-heading">Profile Settings</h1>

        <div class="zzz-account-split-row">
            <article class="zzz-text-content">

                <!-- Display Name Field -->
                <div class="zzz-field">
                    <label>Display Name</label>
                    <input type="text" placeholder="Username" class="zzz-input">
                </div>

                <!-- Bio Field -->
                <div class="zzz-field">
                    <label>Bio</label>
                    <textarea placeholder="About you..." class="zzz-input"></textarea>
                </div>

                <!-- Save Changes Button -->
                <button class="zzz-primary-btn">Save Changes</button>

            </article>
        </div>

    </section>


    <!-- Personalization Settings Section -->
    <section class="zzz-section">

        <h1 class="zzz-account-heading">Personalization Settings</h1>

        <div class="zzz-personalization-container">
            <article class="zzz-text-content">

                <!-- Full Name Field -->
                <div class="zzz-field">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" class="zzz-input">
                </div>

                <!-- ID Field with Preset Number -->
                <div class="zzz-field">
                    <label>ID</label>
                    <input type="text" value="ZZZ-2026-374829" class="zzz-input" readonly>
                </div>

                <!-- Change Password Field -->
                <div class="zzz-field">
                    <label>Change Password</label>
                    <input type="password" placeholder="New password" class="zzz-input">
                </div>

                <!-- Change Mobile Number Field -->
                <div class="zzz-field">
                    <label>Change Mobile Number</label>
                    <input type="tel" placeholder="+1 234 567 8900" class="zzz-input">
                </div>

                <!-- Change Email Field -->
                <div class="zzz-field">
                    <label>Change Email</label>
                    <input type="email" placeholder="your.email@example.com" class="zzz-input">
                </div>

                <!-- Gender Field -->
                <div class="zzz-field">
                    <label>Gender</label>
                    <select class="zzz-input">
                        <option value="">Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                        <option value="prefer-not-to-say">Prefer not to say</option>
                    </select>
                </div>

                <!-- Birthday Field -->
                <div class="zzz-field">
                    <label>Birthday</label>
                    <input type="date" class="zzz-input">
                </div>

                <!-- Apply Settings Button -->
                <button class="zzz-primary-btn">Apply Settings</button>

            </article>
        </div>

    </section>

</main>

</body>
</html>
