<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenless Shop</title>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="Logo">
        </div>

        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="shop.html">Shop</a></li>
            </ul>
        </nav>

        <div class="other-buttons">
            <button type="button">Sign in</button>
            <button type="button">Menu</button>
        </div>
    </header>

    <main>
        <section class="search-buttons">
            <form action="/search" method="GET">
                <input type="text" placeholder="Search Bar" name="search-bar">
            </form>
        </section>

        <section class="shop-section">
            <div class="shop-text-area">
                <p>Text Text Text Text</p>
                <p>Text Text Text Text</p>
                <p>Text Text Text Text</p>
                <a href="catalog.html">
                    <button type="button">Shop Now</button>
                </a>
            </div>
            
            <div class="image1">
                <img src="image1.jpg" alt="image1">
            </div>
        </section>

        <section class="item-carousel">
            <h2>Item Carousel</h2>
            <div class="carousel-grid">
                <div class="Item-box"><img src="item1.jpg" alt="Item 1"></div>
                <div class="Item-box"><img src="item2.jpg" alt="Item 2"></div>
                <div class="Item-box"><img src="item3.jpg" alt="Item 3"></div>
                <div class="Item-box"><img src="item4.jpg" alt="Item 4"></div>
            </div>
        </section>
    </main>

    <footer>
        <section class="socials-bar">
            <p>Socials</p>
        </section>
        
        <div class="footer-bottom">
            <p>Footer</p>
        </div>
    </footer>

</body>
</html>
