<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="account-style.css">
</head>
<body>

    <main class="zzz-main-frame">
        <section class="zzz-section">
            <h1 class="zzz-page-heading">Profile Settings</h1>
            <div class="zzz-split-row">
                <article class="zzz-text-content">
                    <div class="zzz-field">
                        <label>Display Name</label>
                        <input type="text" placeholder="Username" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <label>Bio</label>
                        <textarea placeholder="About you..." class="zzz-input"></textarea>
                    </div>
                    <button class="zzz-primary-btn">Save Changes</button>
                </article>

                <aside class="zzz-image-placeholder secondary-img">
                    <span>Profile Photo</span>
                    <button class="zzz-upload-button">Upload</button>
                </aside>
            </div>
        </section>
    </main>

</body>
</html>
