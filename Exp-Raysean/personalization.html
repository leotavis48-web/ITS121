<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalization Settings</title>
    <link rel="stylesheet" href="account-style.css">
</head>
<body>

    <main class="zzz-main-frame">
        <section class="zzz-section">
            <h1 class="zzz-page-heading">Personalization Settings</h1>
            
            <div class="zzz-personalization-container">
                <article class="zzz-text-content">
                    <ul class="zzz-nav-list">
                        <li class="zzz-nav-item">
                            <span>Dark Mode</span>
                            <input type="checkbox" checked>
                        </li>
                        <li class="zzz-nav-item">
                            <span>Active Status</span>
                            <input type="checkbox">
                        </li>
                        <li class="zzz-nav-item">
                            <span>Notifications</span>
                            <input type="checkbox" checked>
                        </li>
                    </ul>
                    <button class="zzz-primary-btn">Apply Settings</button>
                </article>
            </div>
        </section>
    </main>

</body>
</html>
