<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>
    <link rel="stylesheet" href="account-style.css">
</head>
<body>

    <main class="zzz-main-frame">
        <section class="zzz-section">
            <h1 class="zzz-page-heading">Login / Sign Up</h1>
            <div class="zzz-login-container">
                <form class="zzz-form">
                    <div class="zzz-field">
                        <input type="email" placeholder="Email" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <input type="password" placeholder="Password" class="zzz-input">
                    </div>
                    <div class="zzz-button-group">
                        <button type="submit" class="zzz-primary-btn">Sign In</button>
                        <button type="button" class="zzz-secondary-btn">Create Account</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
