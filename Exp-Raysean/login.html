<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Header</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <main class="zzz-account-frame">
        <section class="zzz-section">
            <h1 class="zzz-account-heading">Login / Sign Up</h1>
            <div class="zzz-login-container">
                <form class="zzz-form">
                    <div class="zzz-field">
                        <input type="email" placeholder="Email" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <input type="password" placeholder="Password" class="zzz-input">
                    </div>
                    <div class="zzz-button-group">
                        <button type="submit" class="zzz-primary-btn">Sign In</button>
                        <button type="button" class="zzz-secondary-btn">Create Account</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
