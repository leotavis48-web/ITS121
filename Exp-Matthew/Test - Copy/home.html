<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenless Zone Zero - New Eridu Supply</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="zzz-main">
        
        <nav>
            <ul class="zzz-nav-menu">
                <li><a href="#">About Us</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Sign In</a></li>
            </ul>
        </nav>

        <section class="zzz-featured-section">
            <article class="zzz-featured-article">
                <div class="zzz-featured-content">
                    <h1>Lorem Ipsum</h1>
                    <br>
                    <p>Lorem Ipsum Lorem Ipsum</p>
                    <button>Shop Now</button>
                </div>
                <figure class="zzz-featured-figure">
                    <img src="placeholder-image-1.jpg" alt="Featured Product">
                    <figcaption>Image 1</figcaption>
                </figure>
            </article>
        </section>

        <section class="zzz-carousel-section">
            <h2>Item Carousel</h2>
            
            <div class="zzz-carousel-wrapper">
                <button class="carousel-btn prev-btn" id="prevBtn">Prev</button>
                
                <div class="zzz-carousel-viewport">
                    <div class="zzz-carousel-track" id="carouselTrack">
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-1.jpg" alt="Product 1">
                            <h3>KirkDuct 1</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-2.jpg" alt="Product 2">
                            <h3>KirkDuct 2</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-3.jpg" alt="Product 3">
                            <h3>KirkDuct 3</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-4.jpg" alt="Product 4">
                            <h3>KirkDuct 4</h3>
                        </article>
                        
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-5.jpg" alt="Product 5">
                            <h3>KirkDuct 5</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-6.jpg" alt="Product 6">
                            <h3>KirkDuct 6</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-7.jpg" alt="Product 7">
                            <h3>KirkDuct 7</h3>
                        </article>
                        <article class="zzz-carousel-item">
                            <img src="placeholder-item-8.jpg" alt="Product 8">
                            <h3>KirkDuct 8</h3>
                        </article>
                    </div>
                </div>

                <button class="carousel-btn next-btn" id="nextBtn">Next</button>
            </div>
        </section>

        <aside class="zzz-socials-section">
            <h2>Socials</h2>
            <div class="zzz-social-icons">
                <div class="zzz-social-icon"><a href="#" title="Twitter">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="YouTube">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="TikTok">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="Discord">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="Instagram">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="Facebook">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="HoYoLab">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="Twitch">?</a></div>
                <div class="zzz-social-icon"><a href="#" title="Telegram">?</a></div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
