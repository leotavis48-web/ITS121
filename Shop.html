<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Shop</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <main class="zzz-main">

            <section class="zzz-recommended-section">
                <h2 class="zzz-page-heading">Recommended Items</h2>

                <div class="zzz-recommended-grid">

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>Short Stack Matthew</p>
                        <p>$49.99</p>
                    </div>

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>Greedy Gian</p>
                        <p>$79.99</p>
                    </div>

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>T-shirt i found at cosco</p>
                        <p>$129.99</p>
                    </div>

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>Bag i drew</p>
                        <p>$59.99</p>
                    </div>

                </div>
            </section>

            <section class="zzz-search-section">
                <h2 class="zzz-page-heading">Search Products</h2>

                <form>
                    <label for="search">Search</label>
                    <input type="search" id="search" placeholder="Search products">

                    <label for="category">Category</label>
                    <select id="category">
                        <option value="">All Categories</option>
                        <option value="clothing">Clothing</option>
                        <option value="electronics">Electronics</option>
                        <option value="accessories">Accessories</option>
                        <option value="shoes">Shoes</option>
                    </select>

                    <button type="submit" class="zzz-hbtn">Search</button>
                </form>
            </section>

            <section class="zzz-search-results">
                <h2 class="zzz-page-heading">Search Results</h2>

                <div class="zzz-recommended-grid">

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>A fabric i made</p>
                        <p>$59.99</p>
                    </div>

                    <div class="zzz-recommended-item">
                        <img src="https://via.placeholder.com/300x200" alt="">
                        <p>Overprices Plushie</p>
                        <p>$99.99</p>
                    </div>

                </div>
            </section>

        </main>

    </body>
</html>
