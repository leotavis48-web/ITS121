<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZZ Dark Mode Buttons</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Oswald', sans-serif;
            color: white;
            padding: 20px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        /* --- BASE BUTTON STYLES --- */
        .zzz-btn {
            position: relative;
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.1s ease;
            user-select: none;
            display: inline-block;
            font-family: 'Oswald', sans-serif;
        }

        /* --- VIEW BUTTON (Cyan/Tech) --- */
        .btn-view {
            background-color: #00E5FF;
            color: #000;
            transform: skew(-10deg);
            box-shadow: 6px 6px 0px #000;
            border: 2px solid #000;
        }

        .btn-view::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            transform: skew(-10deg) translate(4px, 4px);
            z-index: -1;
        }

        .btn-view:hover {
            transform: skew(-10deg) translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000;
        }

        .btn-view:active {
            transform: skew(-10deg) translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* --- DOWNLOAD NOW BUTTON (Yellow/Action) --- */
        .btn-download {
            background-color: #F2D600;
            color: #000;
            transform: skew(-15deg);
            box-shadow: 8px 8px 0px #000;
            border: 2px solid #000;
            overflow: hidden;
        }

        .btn-download::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.3s;
        }

        .btn-download:hover {
            animation: download-glitch 0.3s infinite;
        }

        .btn-download:hover::after {
            left: 100%;
        }

        .btn-download:active {
            transform: skew(-15deg) translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        @keyframes download-glitch {
            0% { transform: skew(-15deg) translate(0, 0); }
            20% { transform: skew(-15deg) translate(-2px, 2px); }
            40% { transform: skew(-15deg) translate(-2px, -2px); }
            60% { transform: skew(-15deg) translate(2px, 2px); }
            80% { transform: skew(-15deg) translate(2px, -2px); }
            100% { transform: skew(-15deg) translate(0, 0); }
        }

        /* --- SHOP BUTTON (Pink/Urgent) --- */
        .btn-shop {
            background-color: #FF0055;
            color: #fff;
            transform: skew(-10deg);
            box-shadow: 6px 6px 0px #000;
            border: 2px solid #000;
        }

        .btn-shop::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            transform: skew(-10deg) translate(4px, 4px);
            z-index: -1;
        }

        .btn-shop:hover {
            transform: skew(-10deg) translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000;
            animation: shop-pulse 0.3s infinite;
        }

        .btn-shop:active {
            transform: skew(-10deg) translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        @keyframes shop-pulse {
            0% { transform: skew(-10deg) translate(-2px, -2px); }
            50% { transform: skew(-10deg) translate(2px, 2px); }
            100% { transform: skew(-10deg) translate(-2px, -2px); }
        }

        /* --- LABELS --- */
        .button-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .button-container {
                flex-direction: column;
                gap: 20px;
            }

            .zzz-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <!-- View Button -->
        <div>
            <div class="button-label">View</div>
            <button class="zzz-btn btn-view">View</button>
        </div>

        <!-- Download Now Button -->
        <div>
            <div class="button-label">Download</div>
           <a href="Google.com" class="zzz-btn btn-download">Download Now</a>
        </div>

        <!-- Shop Button -->
        <div>
            <div class="button-label">Shop</div>
            <button class="zzz-btn btn-shop">Shop</button>
        </div>
    </div>

</body>
</html>
