<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Header</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<header>
    <nav class="navbar navbar-expand-lg navbar-dark zzz-navbar fixed-top">
        <div class="container-fluid">

            <div class="d-flex align-items-center">
                <a class="navbar-brand me-3" href="#">
                    <img src="Assets/zzz.png" alt="Logo" class="zzz-img">
                </a>

                <ul class="navbar-nav mb-2 mb-lg-0 d-flex flex-row">
                    <li class="nav-item me-3">
                         <a class="nav-link active zzz-hbtn" href="#">Home</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="#">About</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="#">Shop</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center ms-auto">
                <a href="#" class="btn btn-outline-light me-2">Sign In</a>
                <a href="#" class="btn btn-outline-light">
                    <i class="fa-solid fa-headset"></i>
                </a>
            </div>

        </div>
    </nav>
</header>



    <main class="zzz-main">
        <section class="zzz-search-section">
            <form role="search">
                <label for="search">Search Bar</label>
                <input type="search" id="search" name="search" placeholder="Search for products...">
            </form>
        </section>

        <section class="zzz-featured-section">
            <article class="zzz-featured-article">
                <div class="zzz-featured-content">
                    <h1>Lorem Ipsum</h1>
                    <p>Lorem Ipsum Lorem Ipsum</p>
                    <button>Shop Now</button>
                </div>
                <figure class="zzz-featured-figure zzz-k-img-container">
                        <img src="Assets/product(1).webp" class="zzz-k-img-bottom">
                        <img src="Assets/Product(2).webp" class="zzz-k-img-top">
                    <figcaption>Image 1</figcaption>
                </figure>
            </article>
        </section>

        <section class="zzz-carousel-section">
            <h2>Item Carousel</h2>
            <div class="zzz-carousel-grid">
                <article class="zzz-carousel-item">
                    <img src="placeholder-item-1.jpg" alt="Product 1">
                    <h3>EvilMatthew 1</h3>
                </article>
                <article class="zzz-carousel-item">
                    <img src="placeholder-item-2.jpg" alt="Product 2">
                    <h3>EvilMatthew 2</h3>
                </article>
                <article class="zzz-carousel-item">
                    <img src="placeholder-item-3.jpg" alt="Product 3">
                    <h3>EvilMatthew 3</h3>
                </article>
                <article class="zzz-carousel-item">
                    <img src="placeholder-item-4.jpg" alt="Product 4">
                    <h3>EvilMatthew 4</h3>
                </article>
            </div>
        </section>
    </main>

<footer class="zzz-footer bg-black text-white py-4 mt-auto w-100">
  <div class="container-fluid text-center">
    <div class="d-flex justify-content-center">
      <a href="#" class="text-white mx-3 fs-4"><i class="fab fa-facebook-f"></i></a>
      <a href="#" class="text-white mx-3 fs-4"><i class="fab fa-twitter"></i></a>
      <a href="#" class="text-white mx-3 fs-4"><i class="fab fa-instagram"></i></a>
      <a href="#" class="text-white mx-3 fs-4"><i class="fab fa-discord"></i></a>
    </div>
    <div class="mt-3">&copy; Copyright © COGNOSPHERE. All Rights Reserved.</div>
  </div>
</footer>

</body>
</html>
