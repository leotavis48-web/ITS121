<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="Assets\zzz.png">
    <title>Zenless Zone Zero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark zzz-navbar fixed-top">
        <div class="container-fluid">

            <div class="d-flex align-items-center">
                <a class="navbar-brand me-3" href="#">
                    <img src="Assets/zzz.png" alt="Logo" class="zzz-img">
                </a>

                <ul class="navbar-nav mb-2 mb-lg-0 d-flex flex-row">
                    <li class="nav-item me-3">
                         <a class="nav-link active zzz-hbtn" href="Home.html">Home</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="About-us.html">About</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="Shop.html">Shop</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center ms-auto">
                <a href="sign-in.html" class="btn btn-outline-light me-2">Sign In</a>
                <a href="support.html" class="btn btn-outline-light">
                    <i class="fa-solid fa-headset"></i>
                </a>
            </div>

        </div>
    </nav>
</header>

<main>

    <section class="zzz-section">
        <h1 class="zzz-account-heading">Profile Settings</h1>
        <div class="zzz-account-split-row">
            <article class="zzz-text-content">

                <div class="zzz-field">
                    <label>Display Name</label>
                    <input type="text" placeholder="Username" class="zzz-input">
                </div>

                <div class="zzz-field">
                    <label>Bio</label>
                    <textarea placeholder="About you..." class="zzz-input"></textarea>
                </div>

                <button class="zzz-primary-btn">Save Changes</button>
            </article>
        </div>
    </section>

    <section class="zzz-section">
        <h1 class="zzz-account-heading">Personalization Settings</h1>
        <div class="zzz-personalization-container">
            <article class="zzz-text-content">

                <div class="zzz-field">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" class="zzz-input">
                </div>

                <div class="zzz-field">
                    <label>ID</label>
                    <input type="text" value="ZZZ-2026-374829" class="zzz-input" readonly>
                </div>

                <div class="zzz-field">
                    <label>Change Password</label>
                    <input type="password" placeholder="New password" class="zzz-input">
                </div>

                <div class="zzz-field">
                    <label>Change Mobile Number</label>
                    <input type="tel" placeholder="+1 234 567 8900" class="zzz-input">
                </div>

                <div class="zzz-field">
                    <label>Change Email</label>
                    <input type="email" placeholder="your.email@example.com" class="zzz-input">
                </div>

                <div class="zzz-field">
                    <label>Gender</label>
                    <select class="zzz-input">
                        <option value="" class="text-primary">Select gender</option>
                        <option value="male" class="text-primary">Male</option>
                        <option value="female" class="text-primary">Female</option>
                        <option value="other" class="text-primary">Other</option>
                        <option value="prefer-not-to-say" class="text-primary">Prefer not to say</option>
                    </select>
                </div>

                <div class="zzz-field">
                    <label>Birthday</label>
                    <input type="date" class="zzz-input">
                </div>

                <button class="zzz-primary-btn">Apply Settings</button>

            </article>
        </div>
    </section>
</main>

<footer class="zzz-footer bg-black text-white py-4 mt-auto w-100">
  <div class="container-fluid text-center">
    <div class="d-flex justify-content-center">
      <a href="https://www.facebook.com/ZZZ.Official.EN/" class="text-white mx-3 fs-4"><i class="fab fa-facebook-f"></i></a>
      <a href="https://x.com/ZZZ_EN" class="text-white mx-3 fs-4"><i class="fab fa-twitter"></i></a>
      <a href="https://www.instagram.com/zzz.official.en/" class="text-white mx-3 fs-4"><i class="fab fa-instagram"></i></a>
      <a href="https://discord.com/invite/zenlesszonezero" class="text-white mx-3 fs-4"><i class="fab fa-discord"></i></a>
    </div>
    <div class="mt-3">&copy; Copyright © COGNOSPHERE. All Rights Reserved.</div>
  </div>
</footer>

</body>
</html>
