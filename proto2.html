<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZZZ Character Display</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* Character Card Container */
        .zzz-character-card {
            position: relative;
            padding: 15px;
            background: #000;
            border: 2px solid #fff;
            transform: skew(-10deg);
            box-shadow: 15px 15px 0px #F2D600; /* Yellow Shadow */
            max-width: 400px;
            width: 100%;
            margin: 20px;
            transition: all 0.3s ease;
        }

        .zzz-character-card:hover {
            transform: skew(-10deg) translate(-5px, -5px);
            box-shadow: 20px 20px 0px #F2D600;
        }

        /* Character Image Container */
        .zzz-char-img-container {
            position: relative;
            width: 100%;
            height: 500px; /* Adjust based on your GIF height */
            overflow: hidden;
            border: 1px solid #000;
            background: #111;
        }

        .zzz-char-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Character Name Tag */
        .zzz-char-name {
            position: absolute;
            bottom: -25px;
            left: 15px;
            background: #F2D600;
            color: #000;
            padding: 8px 20px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1.2rem;
            transform: skew(-10deg);
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
        }

        /* Glitch Effect on Hover */
        .zzz-character-card:hover .zzz-char-img {
            animation: zzz-glitch 0.3s infinite;
        }

        @keyframes zzz-glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* Character Grid Layout */
        .zzz-character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1200px;
            padding: 20px;
        }

        /* Action Button Below Character */
        .zzz-char-action {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #F2D600;
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid #000;
            transform: skew(-10deg);
            box-shadow: 5px 5px 0px #000;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .zzz-char-action:hover {
            transform: skew(-10deg) translate(-2px, -2px);
            box-shadow: 7px 7px 0px #000;
        }

        .zzz-char-action:active {
            transform: skew(-10deg) translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 40px; font-size: 2.5rem; text-transform: uppercase;">Select Agent</h1>

    <div class="zzz-character-grid">
        <!-- Character 1 -->
        <div class="zzz-character-card">
            <div class="zzz-char-img-container">
                <!-- Replace with your actual GIF file -->
                <img src="character1.gif" alt="Character 1" class="zzz-char-img">
            </div>
            <div class="zzz-char-name">
                <span>Short Stack Matthew</span>
            </div>
            <button class="zzz-char-action">Buy now</button>
        </div>

        <!-- Character 2 -->
        <div class="zzz-character-card">
            <div class="zzz-char-img-container">
                <img src="character2.gif" alt="Character 2" class="zzz-char-img">
            </div>
            <div class="zzz-char-name">
                <span>Gian Hardstuck Legend</span>
            </div>
            <button class="zzz-char-action">Buy now</button>
        </div>

        <!-- Character 3 -->
        <div class="zzz-character-card">
            <div class="zzz-char-img-container">
                <img src="character3.gif" alt="Character 3" class="zzz-char-img">
            </div>
            <div class="zzz-char-name">
                <span>Rayfag</span>
            </div>
            <button class="zzz-char-action">Buy now</button>
        </div>
    </div>

</body>
</html>
