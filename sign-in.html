<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Header</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark zzz-navbar fixed-top">
        <div class="container-fluid">

            <div class="d-flex align-items-center">
                <a class="navbar-brand me-3" href="#">
                    <img src="Assets/zzz.png" alt="Logo" class="zzz-img">
                </a>

                <ul class="navbar-nav mb-2 mb-lg-0 d-flex flex-row">
                    <li class="nav-item me-3">
                         <a class="nav-link active zzz-hbtn" href="Home.html">Home</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="About-us.html">About</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link zzz-hbtn" href="Shop.html">Shop</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex align-items-center ms-auto">
                <a href="sign-in.html" class="btn btn-outline-light me-2">Sign In</a>
                <a href="#" class="btn btn-outline-light">
                    <i class="fa-solid fa-headset"></i>
                </a>
            </div>

        </div>
    </nav>
</header>

    <main class="zzz-account-frame">
        <section class="zzz-section">
            <h1 class="zzz-account-heading">Sign in</h1>
            <div class="zzz-login-container">
                <form class="zzz-form">
                    <div class="zzz-field">
                        <input type="Username" placeholder="Username" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <input type="email" placeholder="Email" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <input type="password" placeholder="Password" class="zzz-input">
                    </div>
                    <div class="zzz-field">
                        <input type="Confirm-Password" placeholder="Confirm-Password" class="zzz-input">
                    </div>
                    <div class="zzz-button-group">
                        <button type="submit" class="zzz-primary-btn">Create Account</button>
                        <button type="button"class="zzz-secondary-btn"><a href="login.html" class="nav-link">Login</a></button>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
